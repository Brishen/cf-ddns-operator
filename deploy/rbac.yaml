apiVersion: v1
kind: ServiceAccount
metadata:
  name: cf-ddns-operator
  namespace: networking
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cf-ddns-operator
  namespace: networking
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  - apiGroups: ["dns.cloudflare.example.com"]
    resources: ["cloudflarednsrecords"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["dns.cloudflare.example.com"]
    resources: ["cloudflarednsrecords/status"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cf-ddns-operator
  namespace: networking
subjects:
  - kind: ServiceAccount
    name: cf-ddns-operator
roleRef:
  kind: Role
  name: cf-ddns-operator
  apiGroup: rbac.authorization.k8s.io
