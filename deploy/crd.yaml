apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: cloudflarednsrecords.dns.cloudflare.example.com
spec:
  group: dns.cloudflare.example.com
  scope: Namespaced
  names:
    plural: cloudflarednsrecords
    singular: cloudflarednsrecord
    kind: CloudflareDNSRecord
    shortNames: ["cfdns", "cfdnsrec"]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required: ["spec"]
          properties:
            spec:
              type: object
              required: ["zoneName", "recordName", "secretRef"]
              properties:
                zoneName:
                  type: string
                  description: "Cloudflare zone name, e.g. example.com"
                zoneId:
                  type: string
                  description: "Optional explicit zone id; overrides zoneName lookup."
                recordName:
                  type: string
                  description: "DNS record name; '@' means the zone apex."
                type:
                  type: string
                  enum: ["A", "AAAA"]
                  default: "A"
                proxied:
                  type: boolean
                  default: false
                ttl:
                  type: integer
                  description: "Cloudflare TTL. Use 1 for 'auto'."
                  default: 1
                ip:
                  type: object
                  properties:
                    url:
                      type: string
                      default: "https://api.ipify.org"
                    timeoutSeconds:
                      type: integer
                      default: 5
                syncIntervalSeconds:
                  type: integer
                  description: "Per-resource reconcile interval."
                  default: 300
                secretRef:
                  type: object
                  required: ["name", "key"]
                  properties:
                    name:
                      type: string
                    key:
                      type: string
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                lastSyncTime:
                  type: string
                currentIP:
                  type: string
                zoneId:
                  type: string
                recordId:
                  type: string
                message:
                  type: string
