apiVersion: dns.cloudflare.com/v1alpha1
kind: CloudflareDNSRecord
metadata:
  name: example-apex
  namespace: networking
spec:
  zoneName: example.com
  recordName: "@"
  type: A
  ttl: 1
  proxied: false
  syncIntervalSeconds: 300
  ip:
    url: https://api.ipify.org
    timeoutSeconds: 5
  secretRef:
    name: cloudflare-api-token
    key: token
